<!DOCTYPE html>
<html lang="ar-SA" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم ترند قطعة واحدة | إدارة المنتجات والطلبات</title>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', 'Tahoma', sans-serif;
        }
        
        body {
            background: #0f0f1a;
            padding: 20px;
            color: white;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #ff4b2b;
            font-size: 2rem;
        }
        
        .section {
            background: #1e1e2f;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 40px;
        }
        
        .section h2 {
            color: #ffb347;
            margin-bottom: 20px;
            border-right: 4px solid #ff4b2b;
            padding-right: 15px;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: #2a2a3a;
            color: white;
            margin-bottom: 15px;
            font-size: 1rem;
        }
        
        button {
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        
        button:hover {
            transform: scale(1.02);
            opacity: 0.9;
        }
        
        .delete-btn {
            background: #dc3545;
            padding: 6px 15px;
        }
        
        .complete-btn {
            background: #28a745;
            padding: 6px 15px;
            margin-top: 10px;
        }
        
        .product-item, .order-item {
            background: #2a2a3a;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .product-img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 10px;
        }
        
        .order-details {
            flex: 1;
        }
        
        .order-details p {
            margin: 5px 0;
        }
        
        .highlight {
            color: #ffb347;
            font-weight: bold;
        }
        
        .edit-img-link {
            background: #17a2b8;
            padding: 6px 12px;
            border-radius: 8px;
            text-decoration: none;
            color: white;
            display: inline-block;
            font-size: 0.9rem;
        }
        
        .flex-between {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 8px;
        }
        
        .delete-all-btn {
            background: #dc3545;
            padding: 8px 20px;
            font-size: 0.9rem;
            margin-right: 15px;
        }
        
        @media (max-width: 768px) {
            .product-item, .order-item {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🔧 لوحة تحكم ترند قطعة واحدة</h1>

    <!-- قسم إضافة منتج جديد -->
    <div class="section">
        <h2>➕ إضافة منتج جديد</h2>
        <input type="text" id="productImage" placeholder="رابط الصورة (Google Drive أو أي رابط مباشر)">
        <input type="text" id="productName" placeholder="اسم المنتج">
        <input type="number" id="productPrice" placeholder="السعر (ر.س)">
        <select id="productCategory">
            <option value="electronics">📱 إلكترونيات</option>
            <option value="fashion">👗 فاشون</option>
            <option value="entertainment">🎮 ترفيهية</option>
        </select>
        <button onclick="addProduct()">✨ إضافة المنتج ✨</button>
    </div>

    <!-- قسم المنتجات المعروضة -->
    <div class="section">
        <h2>📦 المنتجات المعروضة</h2>
        <div id="productsList"></div>
    </div>

    <!-- قسم طلبات العملاء -->
    <div class="section">
        <h2>
            📋 طلبات العملاء
            <button onclick="deleteAllOrders()" class="delete-all-btn">🗑️ حذف جميع الطلبات</button>
        </h2>
        <div id="ordersList"></div>
    </div>
</div>

<script>
    // 🔥 إعدادات Firebase - نفس الإعدادات الموجودة في index.html
    const firebaseConfig = {
        apiKey: "AIzaSyBvoorbeeldYourActualApiKey123456",     // ⚠️ استبدل بنفس القيم
        authDomain: "coffee-dda5d.firebaseapp.com",
        databaseURL: "https://coffee-dda5d-default-rtdb.firebaseio.com",
        projectId: "coffee-dda5d",
        storageBucket: "coffee-dda5d.firebasestorage.app",
        messagingSenderId: "123456789012",                     // ⚠️ استبدل بنفس القيم
        appId: "1:123456789012:web:abc123def456"               // ⚠️ استبدل بنفس القيم
    };

    // تهيئة Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // استماع فوري للمنتجات
    database.ref('products').on('value', (snapshot) => {
        const products = snapshot.val();
        displayProducts(products);
    });

    // استماع فوري للطلبات
    database.ref('orders').on('value', (snapshot) => {
        const orders = snapshot.val();
        displayOrders(orders);
    });

    function displayProducts(products) {
        const container = document.getElementById('productsList');
        if(!products || Object.keys(products).length === 0) {
            container.innerHTML = '<p style="text-align:center">لا توجد منتجات، أضف منتجاً الآن</p>';
            return;
        }

        let html = '';
        for(const [id, product] of Object.entries(products)) {
            const categoryName = {
                electronics: 'إلكترونيات', 
                fashion: 'فاشون', 
                entertainment: 'ترفيهية'
            }[product.category] || 'بدون قسم';
            
            html += `
                <div class="product-item">
                    <img src="${product.image}" class="product-img" onerror="this.src='https://picsum.photos/id/20/60/60'">
                    <div style="flex:2">
                        <strong>${product.name}</strong><br>
                        ${product.price} ر.س | ${categoryName}
                    </div>
                    <button class="delete-btn" onclick="deleteProduct('${id}')">🗑️ حذف</button>
                </div>
            `;
        }
        container.innerHTML = html;
    }

    function displayOrders(orders) {
        const container = document.getElementById('ordersList');
        if(!orders || Object.keys(orders).length === 0) {
            container.innerHTML = '<div class="order-item">📭 لا توجد طلبات حالياً</div>';
            return;
        }

        let html = '';
        // عرض الطلبات من الأحدث إلى الأقدم
        const ordersArray = Object.entries(orders).reverse();
        for(const [id, order] of ordersArray) {
            html += `
                <div class="order-item" id="order-${id}">
                    <div class="order-details">
                        <div class="flex-between">
                            <span class="highlight">👤 الاسم:</span>
                            <span>${order.customerName}</span>
                        </div>
                        <div class="flex-between">
                            <span class="highlight">📞 الهاتف:</span>
                            <span>${order.customerPhone}</span>
                        </div>
                        <div class="flex-between">
                            <span class="highlight">📍 العنوان:</span>
                            <span>${order.customerAddress}</span>
                        </div>
                        <div class="flex-between">
                            <span class="highlight">🛍️ المنتج:</span>
                            <span>${order.productName} (${order.productPrice} ر.س)</span>
                        </div>
                        <div class="flex-between">
                            <span class="highlight">🖼️ صورة المنتج:</span>
                            <a href="${order.productImage}" target="_blank" class="edit-img-link">📷 عرض الصورة</a>
                        </div>
                        <div class="flex-between">
                            <span class="highlight">⏱️ تاريخ الطلب:</span>
                            <span>${new Date(order.timestamp).toLocaleString('ar-EG')}</span>
                        </div>
                        <button onclick="deleteOrder('${id}')" class="complete-btn">✅ تم التوصيل / حذف الطلب</button>
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;
    }

    // إضافة منتج جديد
    window.addProduct = function() {
        const image = document.getElementById('productImage').value.trim();
        const name = document.getElementById('productName').value.trim();
        const price = parseInt(document.getElementById('productPrice').value);
        const category = document.getElementById('productCategory').value;

        if(!image || !name || isNaN(price)) {
            alert('❌ الرجاء تعبئة جميع الحقول: الصورة، الاسم، السعر');
            return;
        }

        // تحويل رابط Google Drive إلى رابط مباشر إن أمكن
        let finalImage = image;
        if(image.includes('drive.google.com')) {
            const match = image.match(/\/d\/(.+?)\//) || image.match(/id=([^&]+)/);
            if(match) {
                finalImage = `https://drive.google.com/uc?export=view&id=${match[1]}`;
            }
        }

        const newProduct = {
            name: name,
            price: price,
            image: finalImage,
            category: category
        };

        database.ref('products').push(newProduct)
            .then(() => {
                alert('✅ تم إضافة المنتج بنجاح!');
                document.getElementById('productImage').value = '';
                document.getElementById('productName').value = '';
                document.getElementById('productPrice').value = '';
            })
            .catch(error => {
                alert('❌ خطأ في الإضافة: ' + error.message);
            });
    };

    // حذف منتج
    window.deleteProduct = function(productId) {
        if(confirm('⚠️ هل أنت متأكد من حذف هذا المنتج؟')) {
            database.ref('products/' + productId).remove()
                .then(() => alert('✅ تم حذف المنتج بنجاح'))
                .catch(error => alert('❌ خطأ: ' + error.message));
        }
    };

    // حذف طلب واحد (بعد التوصيل)
    window.deleteOrder = function(orderId) {
        if(confirm('✅ هل تم توصيل الطلب للعميل؟ سيتم حذفه من القائمة.')) {
            database.ref('orders/' + orderId).remove()
                .then(() => alert('✅ تم حذف الطلب'))
                .catch(error => alert('❌ خطأ: ' + error.message));
        }
    };

    // حذف جميع الطلبات
    window.deleteAllOrders = function() {
        if(confirm('⚠️ تحذير: هل أنت متأكد من حذف جميع الطلبات؟ لا يمكن التراجع عن هذا الإجراء.')) {
            database.ref('orders').remove()
                .then(() => alert('🗑️ تم حذف جميع الطلبات'))
                .catch(error => alert('❌ خطأ: ' + error.message));
        }
    };
</script>
</body>
</html>
