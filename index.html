<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم ترند | تحديث لحظي</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: #0f0f1a; padding: 20px; color: white; }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 30px; color: #ff4b2b; }
        .section { background: #1e1e2f; border-radius: 20px; padding: 25px; margin-bottom: 40px; }
        .section h2 { color: #ffb347; margin-bottom: 20px; border-right: 4px solid #ff4b2b; padding-right: 15px; }
        input, textarea { width: 100%; padding: 12px; border-radius: 10px; border: none; background: #2a2a3a; color: white; margin-bottom: 15px; }
        button { background: linear-gradient(45deg, #ff416c, #ff4b2b); color: white; padding: 12px 30px; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; }
        .product-item, .order-item { background: #2a2a3a; border-radius: 15px; padding: 15px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .product-img { width: 60px; height: 60px; object-fit: cover; border-radius: 10px; }
        .delete-btn { background: #dc3545; padding: 6px 15px; }
        .order-details { flex: 1; }
        .order-details p { margin: 5px 0; }
        .highlight { color: #ffb347; font-weight: bold; }
        .edit-img-link { background: #28a745; padding: 6px 12px; border-radius: 8px; text-decoration: none; color: white; display: inline-block; }
        .flex-between { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
        @media (max-width: 768px) { .product-item, .order-item { flex-direction: column; align-items: stretch; } }
    </style>
</head>
<body>
<div class="container">
    <h1>🔧 لوحة تحكم ترند قطعة واحدة (تحديث لحظي)</h1>

    <div class="section">
        <h2>➕ إضافة منتج جديد</h2>
        <input type="text" id="productImage" placeholder="رابط الصورة (Google Drive أو أي رابط مباشر)">
        <input type="text" id="productName" placeholder="اسم المنتج">
        <input type="number" id="productPrice" placeholder="السعر (ج.م)">
        <button onclick="addProduct()">✨ إضافة المنتج ✨</button>
    </div>

    <div class="section">
        <h2>📦 المنتجات المعروضة (تحكم كامل)</h2>
        <div id="productsList"></div>
    </div>

    <div class="section">
        <h2>📋 طلبات العملاء (فورية)</h2>
        <div id="ordersList"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "coffee-dda5d.firebaseapp.com",
        databaseURL: "https://coffee-dda5d-default-rtdb.firebaseio.com",
        projectId: "coffee-dda5d",
        storageBucket: "coffee-dda5d.firebasestorage.app",
        messagingSenderId: "YOUR_SENDER_ID",
        appId: "YOUR_APP_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // استماع فوري للمنتجات
    database.ref('products').on('value', (snapshot) => {
        const products = snapshot.val();
        displayProducts(products);
    });

    // استماع فوري للطلبات
    database.ref('orders').on('value', (snapshot) => {
        const orders = snapshot.val();
        displayOrders(orders);
    });

    function displayProducts(products) {
        const container = document.getElementById('productsList');
        if(!products || Object.keys(products).length === 0) {
            container.innerHTML = '<p>لا توجد منتجات، أضف منتجاً الآن</p>';
            return;
        }

        let html = '';
        for(const [id, product] of Object.entries(products)) {
            html += `
                <div class="product-item">
                    <img src="${product.image}" class="product-img" onerror="this.src='https://picsum.photos/id/20/60/60'">
                    <div style="flex:2"><strong>${product.name}</strong><br>${product.price} ج.م</div>
                    <button class="delete-btn" onclick="deleteProduct('${id}')">🗑️ حذف</button>
                </div>
            `;
        }
        container.innerHTML = html;
    }

    function displayOrders(orders) {
        const container = document.getElementById('ordersList');
        if(!orders || Object.keys(orders).length === 0) {
            container.innerHTML = '<div class="order-item">📭 لا توجد طلبات حالياً</div>';
            return;
        }

        let html = '';
        for(const [id, order] of Object.entries(orders).reverse()) {
            html += `
                <div class="order-item">
                    <div class="order-details">
                        <div class="flex-between">
                            <span class="highlight">👤 الاسم:</span> <span>${order.customerName}</span>
                        </div>
                        <div class="flex-between">
                            <span class="highlight">📞 الهاتف:</span> <span>${order.customerPhone}</span>
                        </div>
                        <div class="flex-between">
                            <span class="highlight">📍 العنوان:</span> <span>${order.customerAddress}</span>
                        </div>
                        <div class="flex-between">
                            <span class="highlight">🛍️ المنتج:</span> <span>${order.productName} (${order.productPrice} ج.م)</span>
                        </div>
                        <div class="flex-between">
                            <span class="highlight">🖼️ صورة المنتج:</span>
                            <a href="${order.productImage}" target="_blank" class="edit-img-link">عرض الصورة</a>
                        </div>
                        <div class="flex-between">
                            <span class="highlight">⏱️ الوقت:</span> <span>${new Date(order.timestamp).toLocaleString('ar-EG')}</span>
                        </div>
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;
    }

    window.addProduct = function() {
        const image = document.getElementById('productImage').value.trim();
        const name = document.getElementById('productName').value.trim();
        const price = parseInt(document.getElementById('productPrice').value);

        if(!image || !name || isNaN(price)) {
            alert('❌ الرجاء تعبئة جميع الحقول');
            return;
        }

        // تحويل رابط درايف إلى رابط مباشر
        let finalImage = image;
        if(image.includes('drive.google.com')) {
            const match = image.match(/\/d\/(.+?)\//) || image.match(/id=([^&]+)/);
            if(match) finalImage = `https://drive.google.com/uc?export=view&id=${match[1]}`;
        }

        const newProduct = { name, price: price, image: finalImage };
        database.ref('products').push(newProduct).then(() => {
            alert('✅ تم إضافة المنتج بنجاح!');
            document.getElementById('productImage').value = '';
            document.getElementById('productName').value = '';
            document.getElementById('productPrice').value = '';
        });
    };

    window.deleteProduct = function(productId) {
        if(confirm('هل أنت متأكد من حذف هذا المنتج؟')) {
            database.ref('products/' + productId).remove()
                .then(() => alert('✅ تم الحذف'))
                .catch(err => alert('❌ خطأ: ' + err.message));
        }
    };
</script>
</body>
</html>
