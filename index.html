    <!-- روابط كانونيكال -->

    <!-- Preconnect لتحسين سرعة التحميل -->
    <link rel="preconnect" href="https://www.gstatic.com">
    <link rel="preconnect" href="https://coffee-dda5d-default-rtdb.firebaseio.com">
    <link rel="dns-prefetch" href="https://firebase.google.com">
    
    <!-- Firebase SDK مع تحميل غير متزامن -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js" defer></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js" defer></script>
    
    <!-- Schema Markup (بيانات منظمة للمنتجات) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "WebSite",
          "@id": "https://trendonepiece.com/#website",
          "url": "https://trendonepiece.com/",
          "name": "ترند قطعة واحدة",
          "description": "أعلى شراء في السعودية - أحدث المنتجات والترندات",
          "inLanguage": "ar-SA",
          "publisher": {
            "@type": "Organization",
            "name": "ترند قطعة واحدة",
            "logo": {
              "@type": "ImageObject",
              "url": "https://trendonepiece.com/logo.png"
            }
          }
        },
        {
          "@type": "BreadcrumbList",
          "@id": "https://trendonepiece.com/#breadcrumb",
          "itemListElement": [
            {
              "@type": "ListItem",
              "position": 1,
              "name": "الرئيسية",
              "item": "https://trendonepiece.com/"
            },
            {
              "@type": "ListItem",
              "position": 2,
              "name": "أعلى شراء في السعودية",
              "item": "https://trendonepiece.com/trending"
            }
          ]
        }
      ]
    }
    </script>
    
    <style>
        /* تحسين Core Web Vitals */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        /* تحسين الخطوط وجعلها سريعة التحميل */
        @font-face {
            font-family: 'Cairo';
            font-style: normal;
            font-weight: 400;
            font-display: swap;
            src: url(https://fonts.gstatic.com/s/cairo/v28/SLXGc1nY6HkvalIkTpu0xg.woff2) format('woff2');
        }
        
        @font-face {
            font-family: 'Cairo';
            font-style: normal;
            font-weight: 700;
            font-display: swap;
            src: url(https://fonts.gstatic.com/s/cairo/v28/SLXGc1nY6HkvalIqTpu0xg.woff2) format('woff2');
        }
        
        body {
            font-family: 'Cairo', 'Tahoma', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 20px;
            color: #fff;
        }
        
        /* تحسين الأداء باستخدام transform بدل margin/padding للحركات */
        .header {
            text-align: center;
            padding: 30px;
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            border-radius: 20px;
            margin-bottom: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            transform: translateZ(0);
            will-change: transform;
        }
        
        .header h1 {
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            color: white;
            text-shadow: 3px 3px 0 rgba(0,0,0,0.5);
        }
        
        .header p {
            color: #ffeb3b;
            font-size: clamp(1rem, 4vw, 1.2rem);
            font-weight: bold;
        }
        
        /* أزرار الأقسام المحسنة SEO */
        .categories-bar {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }
        
        .cat-btn {
            background: rgba(42,42,58,0.95);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateZ(0);
        }
        
        .cat-btn.active {
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            box-shadow: 0 0 15px rgba(255,65,108,0.5);
        }
        
        .cat-btn:hover {
            transform: scale(1.05);
        }
        
        /* شبكة المنتجات مع تحسين الأداء */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        /* تحسين LCP (Largest Contentful Paint) */
        .product-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            background: #fff;
            content-visibility: auto;
            contain-intrinsic-size: auto 450px;
        }
        
        .product-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        
        .image-container {
            width: 100%;
            height: 250px;
            overflow: hidden;
            position: relative;
            background: #f0f0f0;
        }
        
        /* تحسين تحميل الصور */
        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
            loading="lazy";
            decoding="async";
        }
        
        .product-card:hover .image-container img {
            transform: scale(1.1);
        }
        
        .trend-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #ff3366;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.8rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        
        .product-info {
            padding: 20px;
            background: linear-gradient(135deg, #fff, #f9f9f9);
        }
        
        .product-name {
            font-size: 1.3rem;
            font-weight: bold;
            color: #ff3366;
            text-align: center;
        }
        
        .product-price {
            font-size: 1.8rem;
            font-weight: bold;
            color: #00d2ff;
            text-align: center;
            margin: 10px 0;
        }
        
        .order-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .order-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(255,75,43,0.4);
        }
        
        .empty {
            text-align: center;
            color: white;
            font-size: 1.5rem;
            padding: 50px;
        }
        
        /* تحسين المودال للجوال */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }
        
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            animation: modalFadeIn 0.3s ease;
        }
        
        @keyframes modalFadeIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        .modal-content input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        
        .modal-content input:focus {
            border-color: #ff416c;
            outline: none;
        }
        
        /* فوتر محسن SEO */
        .footer {
            text-align: center;
            padding: 30px;
            margin-top: 40px;
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
        }
        
        .footer a {
            color: #ffb347;
            text-decoration: none;
        }
        
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            .products-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            .cat-btn {
                padding: 8px 16px;
                font-size: 0.9rem;
            }
        }
        
        /* تحسين إمكانية الوصول */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>

<main>
    <div class="header">
        <h1>🔥 ترند قطعة واحدة | أعلى شراء في السعودية 🔥</h1>
        <p>🇸🇦 اكتشف المنتجات الأكثر طلباً والترند في المملكة 🇸🇦</p>
    </div>

    <!-- أقسام محسنة SEO -->
    <nav aria-label="أقسام المنتجات">
        <div class="categories-bar">
            <button class="cat-btn active" data-cat="all" aria-label="عرض جميع المنتجات">الكل</button>
            <button class="cat-btn" data-cat="electronics" aria-label="منتجات الإلكترونيات">📱 إلكترونيات</button>
            <button class="cat-btn" data-cat="fashion" aria-label="منتجات الفاشون">👗 فاشون</button>
            <button class="cat-btn" data-cat="entertainment" aria-label="المنتجات الترفيهية">🎮 ترفيهية</button>
        </div>
    </nav>

    <!-- قائمة المنتجات -->
    <div class="products-grid" id="productsGrid" aria-label="قائمة المنتجات الأعلى شراء"></div>
</main>

<footer class="footer">
    <p>© 2025 ترند قطعة واحدة - أعلى شراء في السعودية | جميع الحقوق محفوظة</p>
    <p>📍 المملكة العربية السعودية | 🛍️ أفضل المنتجات الأعلى مبيعاً</p>
    <p><a href="/privacy">سياسة الخصوصية</a> | <a href="/terms">الشروط والأحكام</a></p>
</footer>

<!-- مودال طلب المنتج -->
<div id="orderModal" class="modal" role="dialog" aria-label="نموذج طلب المنتج">
    <div class="modal-content">
        <h2 style="color:#ff3366; margin-bottom:20px;">📝 أطلب المنتج</h2>
        <form id="orderForm">
            <input type="text" id="customerName" placeholder="الاسم الكامل" required aria-label="الاسم الكامل">
            <input type="tel" id="customerPhone" placeholder="رقم الهاتف" required aria-label="رقم الهاتف">
            <input type="text" id="customerAddress" placeholder="العنوان بالتفصيل" required aria-label="العنوان">
            <button type="button" id="submitOrderBtn" style="background:#ff3366; color:white; padding:12px; width:100%; margin-top:15px; border:none; border-radius:50px; font-weight:bold;">✅ تأكيد الطلب</button>
            <button type="button" onclick="closeModal()" style="background:#ccc; margin-top:10px; width:100%;">إلغاء</button>
        </form>
    </div>
</div>

<script>
    // Firebase Configuration - استبدل بقيم مشروعك
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "coffee-dda5d.firebaseapp.com",
        databaseURL: "https://coffee-dda5d-default-rtdb.firebaseio.com",
        projectId: "coffee-dda5d",
        storageBucket: "coffee-dda5d.firebasestorage.app",
        messagingSenderId: "YOUR_SENDER_ID",
        appId: "YOUR_APP_ID"
    };

    // تهيئة Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    
    let currentProduct = null;
    let currentCategory = 'all';
    let productsCache = {};

    // استماع فوري للمنتجات مع تحسين الأداء
    function listenToProducts() {
        database.ref('products').on('value', (snapshot) => {
            productsCache = snapshot.val() || {};
            filterProductsByCategory();
        });
    }

    function filterProductsByCategory() {
        if(!productsCache) { 
            displayProducts([]); 
            return; 
        }
        
        let productsArray = Object.entries(productsCache).map(([id, data]) => ({ id, ...data }));
        
        if(currentCategory !== 'all') {
            productsArray = productsArray.filter(p => p.category === currentCategory);
        }
        
        displayProducts(productsArray);
        
        // تحديث Schema Markup ديناميكياً
        updateProductSchema(productsArray);
    }

    function displayProducts(products) {
        const grid = document.getElementById('productsGrid');
        
        if(products.length === 0) {
            grid.innerHTML = '<div class="empty">🚀 لا توجد منتجات في هذا القسم حالياً<br>ترقبوا أحدث المنتجات الأعلى شراء في السعودية!</div>';
            return;
        }

        grid.innerHTML = products.map(product => `
            <article class="product-card" itemscope itemtype="https://schema.org/Product">
                <div class="image-container">
                    <img src="${product.image}" alt="${product.name}" 
                         onerror="this.src='https://picsum.photos/id/20/300/300'"
                         loading="lazy"
                         decoding="async"
                         itemprop="image">
                    <div class="trend-badge" itemprop="award">🔥 أعلى شراء في السعودية</div>
                </div>
                <div class="product-info">
                    <h2 class="product-name" itemprop="name">${product.name}</h2>
                    <div class="product-price" itemprop="offers" itemscope itemtype="https://schema.org/Offer">
                        <span itemprop="price">${product.price}</span> 
                        <span itemprop="priceCurrency" content="SAR">ر.س</span>
                        <meta itemprop="availability" content="https://schema.org/InStock">
                        <meta itemprop="priceValidUntil" content="2025-12-31">
                    </div>
                    <button class="order-btn" onclick="openOrderModal('${product.id}', '${product.name}', '${product.price}', '${product.image}')" 
                            aria-label="طلب المنتج ${product.name}">
                        🛒 اطلب الآن - أعلى شراء
                    </button>
                </div>
            </article>
        `).join('');
    }

    // تحديث الـ Schema Markup للمنتجات الديناميكية
    function updateProductSchema(products) {
        if(products.length === 0) return;
        
        const schemaProducts = products.slice(0, 5).map(product => ({
            "@type": "Product",
            "name": product.name,
            "image": product.image,
            "offers": {
                "@type": "Offer",
                "price": product.price,
                "priceCurrency": "SAR",
                "availability": "https://schema.org/InStock",
                "seller": {
                    "@type": "Organization",
                    "name": "ترند قطعة واحدة"
                }
            },
            "description": `${product.name} - من أفضل المنتجات الأعلى شراء في السعودية`
        }));
        
        const newSchema = {
            "@context": "https://schema.org",
            "@graph": [
                {
                    "@type": "ItemList",
                    "itemListElement": schemaProducts.map((product, index) => ({
                        "@type": "ListItem",
                        "position": index + 1,
                        "item": product
                    }))
                }
            ]
        };
        
        // إضافة أو تحديث عنصر الـ Schema في الـ head
        let schemaScript = document.querySelector('#dynamic-product-schema');
        if(schemaScript) {
            schemaScript.remove();
        }
        
        schemaScript = document.createElement('script');
        schemaScript.id = 'dynamic-product-schema';
        schemaScript.type = 'application/ld+json';
        schemaScript.textContent = JSON.stringify(newSchema);
        document.head.appendChild(schemaScript);
    }

    window.openOrderModal = function(id, name, price, image) {
        currentProduct = { id, name, price, image };
        document.getElementById('orderModal').style.display = 'flex';
        document.body.style.overflow = 'hidden';
        
        // تتبع حدث الطلب لتحسين SEO (حدث مخصص)
        if(typeof gtag !== 'undefined') {
            gtag('event', 'begin_checkout', {
                'event_category': 'engagement',
                'event_label': name,
                'value': price
            });
        }
    };

    window.closeModal = function() {
        document.getElementById('orderModal').style.display = 'none';
        document.body.style.overflow = 'auto';
        document.getElementById('customerName').value = '';
        document.getElementById('customerPhone').value = '';
        document.getElementById('customerAddress').value = '';
    };

    document.getElementById('submitOrderBtn').onclick = function() {
        const name = document.getElementById('customerName').value.trim();
        const phone = document.getElementById('customerPhone').value.trim();
        const address = document.getElementById('customerAddress').value.trim();

        if(!name || !phone || !address) {
            alert('❌ الرجاء تعبئة جميع الحقول: الاسم، رقم الهاتف، العنوان');
            return;
        }

        const orderData = {
            productId: currentProduct.id,
            productName: currentProduct.name,
            productPrice: currentProduct.price,
            productImage: currentProduct.image,
            customerName: name,
            customerPhone: phone,
            customerAddress: address,
            timestamp: Date.now(),
            status: "جديد",
            location: "السعودية"
        };

        database.ref('orders').push(orderData).then(() => {
            alert('✅ تم استلام طلبك بنجاح! سنتصل بك قريباً.');
            closeModal();
            
            // تتبع التحويل
            if(typeof gtag !== 'undefined') {
                gtag('event', 'purchase', {
                    'event_category': 'conversion',
                    'event_label': currentProduct.name,
                    'value': currentProduct.price
                });
            }
        }).catch(error => {
            alert('❌ حدث خطأ: ' + error.message);
        });
    };

    // أحداث أزرار الأقسام
    document.querySelectorAll('.cat-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentCategory = btn.getAttribute('data-cat');
            filterProductsByCategory();
        });
    });

    // بدء الاستماع للمنتجات
    listenToProducts();
    
    // تسجيل الـ Service Worker لتحسين الأداء (اختياري)
    if('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').catch(err => console.log('ServiceWorker registration failed: ', err));
    }
</script>
