<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ترند قطعة واحدة | أحدث المنتجات</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', 'Tahoma', sans-serif; }
        body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); padding: 20px; }
        .header { text-align: center; padding: 30px; background: linear-gradient(45deg, #ff416c, #ff4b2b); border-radius: 20px; margin-bottom: 40px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); }
        .header h1 { font-size: 2.5rem; color: white; text-shadow: 3px 3px 0 #000; }
        .header p { color: #ffeb3b; font-size: 1.2rem; font-weight: bold; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; max-width: 1400px; margin: 0 auto; }
        .product-card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.3); transition: transform 0.3s ease; cursor: pointer; }
        .product-card:hover { transform: translateY(-10px) scale(1.02); }
        .image-container { width: 100%; height: 250px; overflow: hidden; position: relative; background: #f0f0f0; }
        .image-container img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; }
        .product-card:hover .image-container img { transform: scale(1.1); }
        .trend-badge { position: absolute; top: 10px; right: 10px; background: #ff3366; color: white; padding: 5px 12px; border-radius: 20px; font-weight: bold; }
        .product-info { padding: 20px; background: linear-gradient(135deg, #fff, #f9f9f9); }
        .product-name { font-size: 1.3rem; font-weight: bold; color: #ff3366; text-align: center; }
        .product-price { font-size: 1.8rem; font-weight: bold; color: #00d2ff; text-align: center; margin: 10px 0; }
        .order-btn { width: 100%; padding: 12px; background: linear-gradient(45deg, #ff416c, #ff4b2b); color: white; border: none; border-radius: 50px; font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .order-btn:hover { transform: scale(1.02); }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 500px; }
        .modal-content input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; }
        .empty { text-align: center; color: white; font-size: 1.5rem; padding: 50px; }
        @media (max-width: 768px) { .products-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="header">
    <h1>🔥 ترند قطعة واحدة 🔥</h1>
    <p>أعلى مبيعاً - تحديث لحظي</p>
</div>
<div class="products-grid" id="productsGrid"></div>

<!-- مودال طلب المنتج -->
<div id="orderModal" class="modal">
    <div class="modal-content">
        <h2 style="color:#ff3366; margin-bottom:20px;">📝 أطلب المنتج</h2>
        <input type="text" id="customerName" placeholder="الاسم الكامل" required>
        <input type="tel" id="customerPhone" placeholder="رقم الهاتف" required>
        <input type="text" id="customerAddress" placeholder="العنوان بالتفصيل" required>
        <button id="submitOrderBtn" style="background:#ff3366; color:white; padding:12px; width:100%; margin-top:15px; border:none; border-radius:50px; font-weight:bold;">✅ تأكيد الطلب</button>
        <button onclick="closeModal()" style="background:#ccc; margin-top:10px;">إلغاء</button>
    </div>
</div>

<script>
    // 🔥 إعدادات Firebase - مشروع coffee-dda5d
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",        // ⚠️ استبدلها من إعدادات مشروعك
        authDomain: "coffee-dda5d.firebaseapp.com",
        databaseURL: "https://coffee-dda5d-default-rtdb.firebaseio.com",
        projectId: "coffee-dda5d",
        storageBucket: "coffee-dda5d.firebasestorage.app",
        messagingSenderId: "YOUR_SENDER_ID",
        appId: "YOUR_APP_ID"
    };

    // تهيئة Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let currentProduct = null;

    // استماع فوري للمنتجات
    function listenToProducts() {
        const productsRef = database.ref('products');
        productsRef.on('value', (snapshot) => {
            const products = snapshot.val();
            displayProducts(products);
        });
    }

    function displayProducts(products) {
        const grid = document.getElementById('productsGrid');
        if(!products || Object.keys(products).length === 0) {
            grid.innerHTML = '<div class="empty">🚀 لا توجد منتجات حالياً</div>';
            return;
        }

        const productsArray = Object.entries(products).map(([id, data]) => ({ id, ...data }));
        grid.innerHTML = productsArray.map(product => `
            <div class="product-card">
                <div class="image-container">
                    <img src="${product.image}" alt="${product.name}" onerror="this.src='https://picsum.photos/id/20/300/300'">
                    <div class="trend-badge">🔥 ترند</div>
                </div>
                <div class="product-info">
                    <div class="product-name">${product.name}</div>
                    <div class="product-price">${product.price} ج.م</div>
                    <button class="order-btn" onclick="openOrderModal('${product.id}', '${product.name}', '${product.price}', '${product.image}')">🛒 اطلب الآن</button>
                </div>
            </div>
        `).join('');
    }

    window.openOrderModal = function(id, name, price, image) {
        currentProduct = { id, name, price, image };
        document.getElementById('orderModal').style.display = 'flex';
    };

    window.closeModal = function() {
        document.getElementById('orderModal').style.display = 'none';
        document.getElementById('customerName').value = '';
        document.getElementById('customerPhone').value = '';
        document.getElementById('customerAddress').value = '';
    };

    document.getElementById('submitOrderBtn').onclick = function() {
        const name = document.getElementById('customerName').value.trim();
        const phone = document.getElementById('customerPhone').value.trim();
        const address = document.getElementById('customerAddress').value.trim();

        if(!name || !phone || !address) {
            alert('❌ الرجاء تعبئة جميع الحقول: الاسم، رقم الهاتف، العنوان');
            return;
        }

        const orderData = {
            productId: currentProduct.id,
            productName: currentProduct.name,
            productPrice: currentProduct.price,
            productImage: currentProduct.image,
            customerName: name,
            customerPhone: phone,
            customerAddress: address,
            timestamp: Date.now(),
            status: "جديد"
        };

        // حفظ الطلب في Firebase (تحديث فوري)
        const ordersRef = database.ref('orders');
        ordersRef.push(orderData).then(() => {
            alert('✅ تم استلام طلبك بنجاح! سنتصل بك قريباً.');
            closeModal();
        }).catch(error => {
            alert('❌ حدث خطأ: ' + error.message);
        });
    };

    listenToProducts();
</script>
</body>
</html>
