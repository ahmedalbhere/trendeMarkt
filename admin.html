<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم ترند قطعة واحدة</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', 'Tahoma', sans-serif;
        }

        body {
            background: #0f0f1a;
            padding: 20px;
            color: white;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #ff4b2b;
            font-size: 2rem;
        }

        .section {
            background: #1e1e2f;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 40px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        .section h2 {
            color: #ffb347;
            margin-bottom: 20px;
            border-right: 4px solid #ff4b2b;
            padding-right: 15px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #ddd;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: #2a2a3a;
            color: white;
            font-size: 1rem;
        }

        button {
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.02);
            opacity: 0.9;
        }

        .products-table, .orders-table {
            width: 100%;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #2a2a3a;
            border-radius: 15px;
            overflow: hidden;
        }

        th, td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #3a3a4a;
        }

        th {
            background: #ff4b2b;
            color: white;
        }

        .product-img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 10px;
        }

        .delete-btn {
            background: #dc3545;
            padding: 6px 12px;
            font-size: 0.8rem;
        }

        .edit-img-link {
            background: #28a745;
            padding: 6px 12px;
            font-size: 0.8rem;
            text-decoration: none;
            color: white;
            border-radius: 8px;
            display: inline-block;
        }

        .order-card {
            background: #2a2a3a;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .flex-between {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }

        .highlight {
            color: #ffb347;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🔧 لوحة تحكم ترند قطعة واحدة</h1>

    <!-- إضافة منتج جديد -->
    <div class="section">
        <h2>➕ إضافة منتج جديد</h2>
        <div class="form-group">
            <label>📷 رابط صورة المنتج (Google Drive أو أي رابط مباشر)</label>
            <input type="text" id="productImage" placeholder="https://drive.google.com/uc?export=view&id=...">
        </div>
        <div class="form-group">
            <label>🏷️ اسم المنتج</label>
            <input type="text" id="productName" placeholder="مثال: سماعات لاسلكية">
        </div>
        <div class="form-group">
            <label>💰 السعر (ج.م)</label>
            <input type="number" id="productPrice" placeholder="299">
        </div>
        <button onclick="addProduct()">✨ إضافة المنتج ✨</button>
    </div>

    <!-- المنتجات الحالية -->
    <div class="section">
        <h2>📦 المنتجات المعروضة (تحكم كامل)</h2>
        <div class="products-table" id="productsTable"></div>
    </div>

    <!-- طلبات العملاء -->
    <div class="section">
        <h2>📋 طلبات العملاء الجديدة</h2>
        <div id="ordersList"></div>
    </div>
</div>

<script>
    let products = [];

    function loadData() {
        const storedProducts = localStorage.getItem('trend_products');
        if(storedProducts) {
            products = JSON.parse(storedProducts);
        } else {
            products = [
                { id: 1, name: "سماعات لاسلكية Bass X", price: 299, image: "https://picsum.photos/id/1/300/300" },
                { id: 2, name: "ساعة ذكية Ultra Watch", price: 599, image: "https://picsum.photos/id/2/300/300" },
                { id: 3, name: "باور بانك 20000mAh", price: 159, image: "https://picsum.photos/id/3/300/300" }
            ];
            saveProducts();
        }
        displayProducts();
        displayOrders();
    }

    function saveProducts() {
        localStorage.setItem('trend_products', JSON.stringify(products));
    }

    function displayProducts() {
        const container = document.getElementById('productsTable');
        if(products.length === 0) {
            container.innerHTML = '<p style="text-align:center">لا توجد منتجات، أضف منتجاً الآن</p>';
            return;
        }

        let html = '<table><thead><tr><th>الصورة</th><th>الاسم</th><th>السعر</th><th>إجراءات</th></tr></thead><tbody>';
        products.forEach(product => {
            html += `
                <tr>
                    <td><img src="${product.image}" class="product-img" onerror="this.src='https://picsum.photos/id/20/60/60'"></td>
                    <td>${product.name}</td>
                    <td>${product.price} ج.م</td>
                    <td>
                        <button class="delete-btn" onclick="deleteProduct(${product.id})">🗑️ حذف</button>
                    </td>
                </tr>
            `;
        });
        html += '</tbody></table>';
        container.innerHTML = html;
    }

    window.addProduct = function() {
        const imageLink = document.getElementById('productImage').value.trim();
        const name = document.getElementById('productName').value.trim();
        const price = parseInt(document.getElementById('productPrice').value);

        if(!imageLink || !name || isNaN(price)) {
            alert('❌ الرجاء تعبئة جميع الحقول: رابط الصورة، الاسم، السعر');
            return;
        }

        // تحويل رابط درايف إلى رابط مباشر إذا كان بصيغة shared
        let finalImage = imageLink;
        if(imageLink.includes('drive.google.com') && imageLink.includes('/d/')) {
            const match = imageLink.match(/\/d\/(.+?)\//);
            if(match) {
                finalImage = `https://drive.google.com/uc?export=view&id=${match[1]}`;
            }
        } else if(imageLink.includes('drive.google.com') && imageLink.includes('id=')) {
            const id = imageLink.split('id=')[1].split('&')[0];
            finalImage = `https://drive.google.com/uc?export=view&id=${id}`;
        }

        const newId = Date.now();
        const newProduct = {
            id: newId,
            name: name,
            price: price,
            image: finalImage
        };
        products.push(newProduct);
        saveProducts();
        displayProducts();

        // مسح الحقول
        document.getElementById('productImage').value = '';
        document.getElementById('productName').value = '';
        document.getElementById('productPrice').value = '';

        alert('✅ تم إضافة المنتج بنجاح! سيظهر فوراً للمستخدمين.');
    };

    window.deleteProduct = function(id) {
        if(confirm('هل أنت متأكد من حذف هذا المنتج؟')) {
            products = products.filter(p => p.id !== id);
            saveProducts();
            displayProducts();
            alert('🗑️ تم الحذف.');
        }
    };

    function displayOrders() {
        const orders = JSON.parse(localStorage.getItem('trend_orders') || '[]');
        const ordersDiv = document.getElementById('ordersList');

        if(orders.length === 0) {
            ordersDiv.innerHTML = '<div class="order-card">📭 لا توجد طلبات حالياً</div>';
            return;
        }

        ordersDiv.innerHTML = orders.reverse().map(order => `
            <div class="order-card">
                <div class="flex-between">
                    <span class="highlight">👤 الطالب:</span> <span>${order.customerName}</span>
                </div>
                <div class="flex-between">
                    <span class="highlight">📞 الهاتف:</span> <span>${order.phone}</span>
                </div>
                <div class="flex-between">
                    <span class="highlight">🛍️ المنتج:</span> <span>${order.productName} (${order.productPrice} ج.م)</span>
                </div>
                <div class="flex-between">
                    <span class="highlight">🖼️ صورة المنتج:</span> 
                    <a href="${order.productImage}" target="_blank" class="edit-img-link">عرض الصورة</a>
                </div>
                <div class="flex-between">
                    <span class="highlight">📅 التاريخ:</span> <span>${order.date}</span>
                </div>
            </div>
        `).join('');
    }

    // تحديث الطلبات كل 3 ثواني (للمسؤول)
    setInterval(() => {
        displayOrders();
    }, 3000);

    loadData();
</script>
</body>
</html>
